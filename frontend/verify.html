<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تایید کد - دکتر رزرو</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
    body{font-family:Vazirmatn,sans-serif}
</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md px-6">
    <div class="bg-white rounded-3xl border p-8 shadow-sm">
        <h2 class="text-xl font-bold text-gray-800 text-center mb-2">تایید کد</h2>
        <p class="text-gray-500 text-sm text-center mb-6">کد تایید را وارد کنید</p>

        <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4"></div>

        <form id="verifyForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">کد تایید</label>
                <input type="text" id="codeInput" 
                       class="w-full px-4 py-3.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 transition text-gray-700 text-center text-2xl font-bold" 
                       placeholder="------"
                       maxlength="6">
            </div>

            <button type="submit" id="verifyBtn"
                    class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">
                تایید کد
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-blue-600 text-sm hover:text-blue-800 transition">
                ↩️ بازگشت به ورود
            </a>
        </div>
    </div>
</div>

<script>
const API_URL = 'http://localhost:3000/api';

document.getElementById('verifyForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const code = document.getElementById('codeInput').value.trim();
    const btn = document.getElementById('verifyBtn');
    const errorDiv = document.getElementById('errorMessage');

    errorDiv.classList.add('hidden');
    errorDiv.textContent = '';

    if (code.length !== 6) {
        errorDiv.textContent = 'کد تایید ۶ رقمی است';
        errorDiv.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'در حال تایید...';

    try {
        const phone = localStorage.getItem('userPhone');
        
        const response = await fetch(`${API_URL}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, code })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem('token', data.data.token);
            localStorage.setItem('userName', data.data.user.name);
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'landingpage.html';
        } else {
            errorDiv.textContent = data.message || 'کد نامعتبر است';
            errorDiv.classList.remove('hidden');
        }
    } catch (error) {
        console.error('❌ خطا:', error);
        errorDiv.textContent = '❌ خطا در ارتباط با سرور';
        errorDiv.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'تایید کد';
    }
});

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
        document.getElementById('codeInput').value = code;
    }
};
</script>

</body>
</html>
